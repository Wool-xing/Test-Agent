name: verification-loop
version: 1.0.0
kind: skill
description: >-
  5-phase 验证循环 Skill:build → typecheck → lint → test → coverage。任意失败 STOP + 修。派生自 ECC 同名 skill 。PR 前 / 质量门禁前 / refactor 后必跑。
description_zh: 5-phase 验证循环 Skill
backend: llm
tools:
- Read
- Write
- Bash
- Grep
- Glob
paired_skills: []
script_path: null
requires_layer: []
system_prompt: "# verification-loop\n\n## 触发\n\n- feature 完成后\n- PR 提交前\n- 质量门禁前 \n- refactor 后\n- darwin-skill 评分前\n\n##\
  \ 5 Phase(任意失败 STOP)\n\n### Phase 1 · Build Verification\n```bash\n# 本项目:runtime/ 子包\npip install -e ./runtime 2>&1 | tail\
  \ -20\n```\n失败 → STOP\n\n### Phase 2 · Type Check\n```bash\n# Python\nmypy runtime/ 2>&1 | head -30\n# 或 pyright\npyright\
  \ runtime/ 2>&1 | head -30\n```\n报所有 type errors;关键的修\n\n### Phase 3 · Lint Check\n```bash\nruff check runtime/ 2>&1 | head\
  \ -30\n```\n\n### Phase 4 · Test Suite\n```bash\npytest runtime/tests/ -v 2>&1 | tail -50\n```\n全过才进下一步\n\n### Phase 5 ·\
  \ Coverage\n```bash\npytest --cov=runtime --cov-report=term-missing 2>&1 | tail -30\n```\n对比 regression 门槛 cov ≥ 80%\n\n\
  ## 融合\n\n- 五层门禁:本 skill 是**进 smoke → regression** 的前置\n- 修改四关:四关 = 本 skill 4 阶段简化版\n- 横切可复现性:失败必固定 seed + snapshot\n\n##\
  \ 不做\n\n- 不跳阶段 \n- 不忽略 type 错误\"等会儿再修\"\n- 不静默吞 lint warning(--fix 默认开)"
