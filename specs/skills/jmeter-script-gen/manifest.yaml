name: jmeter-script-gen
version: 1.0.0
kind: skill
description: JMeter 性能脚本生成技能。输入接口信息或业务流程描述，生成可直接运行的 JMeter JMX 测试计划，支持接口压测/业务流程并发/阶梯加压三种模式。数据由
  data-preparer 提供 CSV，结果输出给 test-executor / report-generator / bug-manager。
description_zh: JMeter 性能脚本生成技能
backend: llm
tools:
- Read
- Write
- Edit
- Grep
- Glob
paired_skills: []
requires_layer: []
system_prompt: "> **JMeter 版本兼容**: 本模板不硬编码 `saveConfig`，结果保存配置走 `jmeter.properties`\
  \ 默认值，兼容 JMeter 5.0 ~ 5.6.3。ThreadGroup 含 `${变量}` 的属性统一用 `stringProp`，避免跨版本参数化失效。\n\
  \n# JMeter 性能脚本生成\n\n## 触发方式\n\n```text\n/jmeter-script-gen [接口信息 或 业务流程描述]\n```\n\
  \n## \U0001F514 调用前置准备\n\n```text\n□ Java JRE 17+ 已装（java -version）\n□ JMeter 5.6.3\
  \ 已装（jmeter --version 可执行，PATH 配好）\n□ data-preparer 已生成 workspace/测试数据/jmeter_users.csv\n\
  □ 目标接口信息：URL（解析为 host/protocol/port 三参，不含协议前缀）\n□ 性能目标：目标 TPS / P95 / 并发数（决定 PERF_MODE）\n\
  □ workspace/自动化脚本/jmeter/ 目录已存在（conftest 自动建）\n□ workspace/测试报告/{项目名}/baselines/perf_baseline.json（基线对比，可选）\n\
  ```\n\n## 数据流（与其他 Agent 闭环）\n\n```text\ndata-preparer\n  → workspace/测试数据/jmeter_users.csv（参数化数据，由\
  \ utils/jmeter_csv_exporter）\n       ↓\nautomation-engineer（执行本技能生成 JMX）\n  → workspace/自动化脚本/jmeter/test_plan.jmx\n\
  \       ↓\ntest-executor\n  → 执行 jmeter -n，输出 result.jtl + 性能指标 JSON\n       ↓\n\
  \       ├─→ report-generator     : HTML 报告 + 通知\n       └─→ bug-manager        \
  \  : 性能 Bug 工单（TPS低 / P95超限 / 错误率高）\n```\n\n## 执行流程\n\n### Step 1：分析性能需求\n\n从需求\
  \ JSON 摘要 `requirements_summary_*.json` 的 `performance_requirements` 字段提取：\n- 目标接口列表（URL\
  \ / Method / Header / Body）\n- 性能目标（目标 TPS / 响应时间上限 / 并发用户数）\n- 测试模式（接口级压测 / 业务流程并发\
  \ / 阶梯加压）\n\n### Step 2：调用 data-preparer 准备 CSV\n\n```python\nfrom utils.jmeter_csv_exporter\
  \ import generate_jmeter_dataset\n\ngenerate_jmeter_dataset(count=50, output_path=\"\
  workspace/测试数据/jmeter_users.csv\")\n```\n\nCSV 格式：\n\n```csv\nusername,password,user_id\n\
  test_user_a3f2,Test@123456,xxxx-xxxx-xxxx-xxxx\ntest_user_b9k7,Test@123456,xxxx-xxxx-xxxx-xxxx\n\
  ```\n\n### Step 3：生成 JMX 测试计划\n\n#### 关键变量（命令行 -J 注入）\n\n| 变量 | 含义 | 默认 |\n|------|------|------|\n\
  | `target_host` | 目标主机（**不含协议前缀**） | test-api.example.com |\n| `target_protocol`\
  \ | http / https | http |\n| `target_port` | 端口 | 80 |\n| `threads` | 并发数 | 5 |\n\
  | `rampup` | 启动时间（秒） | 10 |\n| `duration` | 持续时间（秒） | 60 |\n\n#### 模板A：标准接口压测（最常用）\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<jmeterTestPlan version=\"\
  1.2\" properties=\"5.0\" jmeter=\"5.6.3\">\n  <hashTree>\n    <TestPlan guiclass=\"\
  TestPlanGui\" testclass=\"TestPlan\"\n              testname=\"接口性能测试计划\" enabled=\"\
  true\">\n      <elementProp name=\"TestPlan.user_defined_variables\" elementType=\"\
  Arguments\">\n        <collectionProp name=\"Arguments.arguments\">\n          <elementProp\
  \ name=\"TARGET_HOST\" elementType=\"Argument\">\n            <stringProp name=\"\
  Argument.name\">TARGET_HOST</stringProp>\n            <stringProp name=\"Argument.value\"\
  >${__P(target_host,test-api.example.com)}</stringProp>\n          </elementProp>\n\
  \          <elementProp name=\"TARGET_PROTOCOL\" elementType=\"Argument\">\n   \
  \         <stringProp name=\"Argument.name\">TARGET_PROTOCOL</stringProp>\n    \
  \        <stringProp name=\"Argument.value\">${__P(target_protocol,http)}</stringProp>\n\
  \          </elementProp>\n          <elementProp name=\"TARGET_PORT\" elementType=\"\
  Argument\">\n            <stringProp name=\"Argument.name\">TARGET_PORT</stringProp>\n\
  \            <stringProp name=\"Argument.value\">${__P(target_port,80)}</stringProp>\n\
  \          </elementProp>\n          <elementProp name=\"THREADS\" elementType=\"\
  Argument\">\n            <stringProp name=\"Argument.name\">THREADS</stringProp>\n\
  \            <stringProp name=\"Argument.value\">${__P(threads,5)}</stringProp>\n\
  \          </elementProp>\n          <elementProp name=\"RAMPUP\" elementType=\"\
  Argument\">\n            <stringProp name=\"Argument.name\">RAMPUP</stringProp>\n\
  \            <stringProp name=\"Argument.value\">${__P(rampup,10)}</stringProp>\n\
  \          </elementProp>\n          <elementProp name=\"DURATION\" elementType=\"\
  Argument\">\n            <stringProp name=\"Argument.name\">DURATION</stringProp>\n\
  \            <stringProp name=\"Argument.value\">${__P(duration,60)}</stringProp>\n\
  \          </elementProp>\n        </collectionProp>\n      </elementProp>\n   \
  \ </TestPlan>\n    <hashTree>\n\n      <!-- CSV 参数化（数据由 data-preparer 生成） -->\n\
  \      <CSVDataSet guiclass=\"TestBeanGUI\" testclass=\"CSVDataSet\"\n         \
  \         testname=\"参数化数据_CSV\" enabled=\"true\">\n        <stringProp name=\"\
  filename\">workspace/测试数据/jmeter_users.csv</stringProp>\n        <stringProp name=\"\
  variableNames\">username,password,user_id</stringProp>\n        <stringProp name=\"\
  delimiter\">,</stringProp>\n        <boolProp name=\"quotedData\">false</boolProp>\n\
  \        <boolProp name=\"recycle\">true</boolProp>\n        <boolProp name=\"stopThread\"\
  >false</boolProp>\n        <stringProp name=\"shareMode\">shareMode.all</stringProp>\n\
  \      </CSVDataSet>\n      <hashTree/>\n\n      <!-- HTTP 默认值（host/port/protocol\
  \ 全变量化）-->\n      <ConfigTestElement guiclass=\"HttpDefaultsGui\" testclass=\"ConfigTestElement\"\
  \n                         testname=\"HTTP请求默认值\" enabled=\"true\">\n        <elementProp\
  \ name=\"HTTPsampler.Arguments\" elementType=\"Arguments\">\n          <collectionProp\
  \ name=\"Arguments.arguments\"/>\n        </elementProp>\n        <stringProp name=\"\
  HTTPSampler.domain\">${TARGET_HOST}</stringProp>\n        <stringProp name=\"HTTPSampler.port\"\
  >${TARGET_PORT}</stringProp>\n        <stringProp name=\"HTTPSampler.protocol\"\
  >${TARGET_PROTOCOL}</stringProp>\n        <stringProp name=\"HTTPSampler.contentEncoding\"\
  >UTF-8</stringProp>\n      </ConfigTestElement>\n      <hashTree/>\n\n      <!--\
  \ 全局 Header -->\n      <HeaderManager guiclass=\"HeaderPanel\" testclass=\"HeaderManager\"\
  \n                     testname=\"全局请求头\" enabled=\"true\">\n        <collectionProp\
  \ name=\"HeaderManager.headers\">\n          <elementProp name=\"\" elementType=\"\
  Header\">\n            <stringProp name=\"Header.name\">Content-Type</stringProp>\n\
  \            <stringProp name=\"Header.value\">application/json</stringProp>\n \
  \         </elementProp>\n        </collectionProp>\n      </HeaderManager>\n  \
  \    <hashTree/>\n\n      <!-- 线程组 -->\n      <ThreadGroup guiclass=\"ThreadGroupGui\"\
  \ testclass=\"ThreadGroup\"\n                   testname=\"并发用户组\" enabled=\"true\"\
  >\n        <stringProp name=\"ThreadGroup.num_threads\">${THREADS}</stringProp>\n\
  \        <stringProp name=\"ThreadGroup.ramp_time\">${RAMPUP}</stringProp>\n   \
  \     <stringProp name=\"ThreadGroup.duration\">${DURATION}</stringProp>\n     \
  \   <longProp name=\"ThreadGroup.delay\">0</longProp>\n        <boolProp name=\"\
  ThreadGroup.scheduler\">true</boolProp>\n        <stringProp name=\"ThreadGroup.on_sample_error\"\
  >continue</stringProp>\n      </ThreadGroup>\n      <hashTree>\n\n        <!-- Step\
  \ 1: 登录获取 Token -->\n        <HTTPSamplerProxy guiclass=\"HttpTestSampleGui\" testclass=\"\
  HTTPSamplerProxy\"\n                          testname=\"01_登录获取Token\" enabled=\"\
  true\">\n          <stringProp name=\"HTTPSampler.path\">/api/v1/auth/login</stringProp>\n\
  \          <stringProp name=\"HTTPSampler.method\">POST</stringProp>\n         \
  \ <boolProp name=\"HTTPSampler.use_keepalive\">true</boolProp>\n          <boolProp\
  \ name=\"HTTPSampler.postBodyRaw\">true</boolProp>\n          <elementProp name=\"\
  HTTPsampler.Arguments\" elementType=\"Arguments\">\n            <collectionProp\
  \ name=\"Arguments.arguments\">\n              <elementProp name=\"\" elementType=\"\
  HTTPArgument\">\n                <boolProp name=\"HTTPArgument.always_encode\">false</boolProp>\n\
  \                <stringProp name=\"Argument.value\">{\"username\":\"${username}\"\
  ,\"password\":\"${password}\"}</stringProp>\n                <stringProp name=\"\
  Argument.metadata\">=</stringProp>\n              </elementProp>\n            </collectionProp>\n\
  \          </elementProp>\n        </HTTPSamplerProxy>\n        <hashTree>\n   \
  \       <!-- 提取 Token（JMeter 5.x 用 JSONPostProcessor） -->\n          <JSONPostProcessor\
  \ guiclass=\"JSONPostProcessorGui\" testclass=\"JSONPostProcessor\"\n          \
  \                   testname=\"提取Token\" enabled=\"true\">\n            <stringProp\
  \ name=\"JSONPostProcessor.referenceNames\">access_token</stringProp>\n        \
  \    <stringProp name=\"JSONPostProcessor.jsonPathExprs\">$.token</stringProp>\n\
  \            <stringProp name=\"JSONPostProcessor.defaultValues\">TOKEN_NOT_FOUND</stringProp>\n\
  \          </JSONPostProcessor>\n          <hashTree/>\n          <!-- 登录响应断言 -->\n\
  \          <ResponseAssertion guiclass=\"AssertionGui\" testclass=\"ResponseAssertion\"\
  \n                             testname=\"登录响应断言\" enabled=\"true\">\n         \
  \   <collectionProp name=\"Asserion.test_strings\">\n              <stringProp name=\"\
  49586\">200</stringProp>\n            </collectionProp>\n            <stringProp\
  \ name=\"Assertion.test_field\">Assertion.response_code</stringProp>\n         \
  \   <intProp name=\"Assertion.test_type\">8</intProp>\n          </ResponseAssertion>\n\
  \          <hashTree/>\n          <!-- 登录失败时中止当前线程（防止后续 401 雪崩） -->\n          <IfController\
  \ guiclass=\"IfControllerPanel\" testclass=\"IfController\"\n                  \
  \      testname=\"If 登录成功\" enabled=\"true\">\n            <stringProp name=\"IfController.condition\"\
  >\"${access_token}\" != \"TOKEN_NOT_FOUND\"</stringProp>\n            <boolProp\
  \ name=\"IfController.evaluateAll\">false</boolProp>\n            <boolProp name=\"\
  IfController.useExpression\">true</boolProp>\n          </IfController>\n      \
  \    <hashTree/>\n        </hashTree>\n\n        <!-- Step 2: 核心业务接口（仅在登录成功时执行）\
  \ -->\n        <HTTPSamplerProxy guiclass=\"HttpTestSampleGui\" testclass=\"HTTPSamplerProxy\"\
  \n                          testname=\"02_核心业务接口\" enabled=\"true\">\n         \
  \ <stringProp name=\"HTTPSampler.path\">/api/v1/home</stringProp>\n          <stringProp\
  \ name=\"HTTPSampler.method\">GET</stringProp>\n          <boolProp name=\"HTTPSampler.use_keepalive\"\
  >true</boolProp>\n          <elementProp name=\"HTTPsampler.Arguments\" elementType=\"\
  Arguments\">\n            <collectionProp name=\"Arguments.arguments\"/>\n     \
  \     </elementProp>\n        </HTTPSamplerProxy>\n        <hashTree>\n        \
  \  <HeaderManager guiclass=\"HeaderPanel\" testclass=\"HeaderManager\"\n       \
  \                  testname=\"认证Header\" enabled=\"true\">\n            <collectionProp\
  \ name=\"HeaderManager.headers\">\n              <elementProp name=\"\" elementType=\"\
  Header\">\n                <stringProp name=\"Header.name\">Authorization</stringProp>\n\
  \                <stringProp name=\"Header.value\">Bearer ${access_token}</stringProp>\n\
  \              </elementProp>\n            </collectionProp>\n          </HeaderManager>\n\
  \          <hashTree/>\n          <ResponseAssertion guiclass=\"AssertionGui\" testclass=\"\
  ResponseAssertion\"\n                             testname=\"业务响应断言\" enabled=\"\
  true\">\n            <collectionProp name=\"Asserion.test_strings\">\n         \
  \     <stringProp name=\"49586\">200</stringProp>\n            </collectionProp>\n\
  \            <stringProp name=\"Assertion.test_field\">Assertion.response_code</stringProp>\n\
  \            <intProp name=\"Assertion.test_type\">8</intProp>\n          </ResponseAssertion>\n\
  \          <hashTree/>\n        </hashTree>\n\n        <!-- 结果收集 -->\n        <ResultCollector\
  \ guiclass=\"StatVisualizer\" testclass=\"ResultCollector\"\n                  \
  \       testname=\"聚合报告\" enabled=\"true\">\n          <boolProp name=\"ResultCollector.error_logging\"\
  >false</boolProp>\n          <stringProp name=\"filename\">workspace/测试报告/{项目名}/jmeter-results/result.jtl</stringProp>\n\
  \        </ResultCollector>\n        <hashTree/>\n\n      </hashTree>\n    </hashTree>\n\
  \  </hashTree>\n</jmeterTestPlan>\n```\n\n#### 模板B：阶梯加压（10 → 50 → 100 用户）\n\n用三个串行\
  \ ThreadGroup 模拟阶梯：\n\n```xml\n<!-- 阶梯1：10 用户 / 30s 加压 / 持续 120s -->\n<ThreadGroup\
  \ testname=\"Step1_10用户\" enabled=\"true\">\n  <intProp name=\"ThreadGroup.num_threads\"\
  >10</intProp>\n  <intProp name=\"ThreadGroup.ramp_time\">30</intProp>\n  <longProp\
  \ name=\"ThreadGroup.duration\">120</longProp>\n  <boolProp name=\"ThreadGroup.scheduler\"\
  >true</boolProp>\n</ThreadGroup>\n\n<!-- 阶梯2：50 用户 -->\n<ThreadGroup testname=\"\
  Step2_50用户\" enabled=\"true\">\n  <intProp name=\"ThreadGroup.num_threads\">50</intProp>\n\
  \  <intProp name=\"ThreadGroup.ramp_time\">60</intProp>\n  <longProp name=\"ThreadGroup.duration\"\
  >120</longProp>\n  <boolProp name=\"ThreadGroup.scheduler\">true</boolProp>\n  <longProp\
  \ name=\"ThreadGroup.delay\">120</longProp>\n</ThreadGroup>\n\n<!-- 阶梯3：100 用户 -->\n\
  <ThreadGroup testname=\"Step3_100用户\" enabled=\"true\">\n  <intProp name=\"ThreadGroup.num_threads\"\
  >100</intProp>\n  <intProp name=\"ThreadGroup.ramp_time\">60</intProp>\n  <longProp\
  \ name=\"ThreadGroup.duration\">120</longProp>\n  <boolProp name=\"ThreadGroup.scheduler\"\
  >true</boolProp>\n  <longProp name=\"ThreadGroup.delay\">240</longProp>\n</ThreadGroup>\n\
  ```\n\n## 执行命令\n\n```bash\n# CI 默认：ci_quick\njmeter -n \\\n  -t workspace/自动化脚本/jmeter/test_plan.jmx\
  \ \\\n  -l workspace/测试报告/{项目名}/jmeter-results/result.jtl \\\n  -e -o workspace/测试报告/{项目名}/jmeter-report/\
  \ \\\n  -Jtarget_host=\"${TARGET_HOST}\" \\\n  -Jtarget_protocol=\"${TARGET_PROTOCOL:-http}\"\
  \ \\\n  -Jtarget_port=\"${TARGET_PORT:-80}\" \\\n  -Jthreads=5 -Jrampup=10 -Jduration=60\n\
  \n# 完整压测：full（手动 / release）\njmeter -n \\\n  -t workspace/自动化脚本/jmeter/test_plan.jmx\
  \ \\\n  -l workspace/测试报告/{项目名}/jmeter-results/result.jtl \\\n  -e -o workspace/测试报告/{项目名}/jmeter-report/\
  \ \\\n  -Jtarget_host=\"${TARGET_HOST}\" \\\n  -Jtarget_protocol=\"${TARGET_PROTOCOL:-http}\"\
  \ \\\n  -Jtarget_port=\"${TARGET_PORT:-80}\" \\\n  -Jthreads=50 -Jrampup=60 -Jduration=300\n\
  \n# 阶梯加压\njmeter -n \\\n  -t workspace/自动化脚本/jmeter/stepped_load.jmx \\\n  -l workspace/测试报告/{项目名}/jmeter-results/stepped_result.jtl\
  \ \\\n  -Jtarget_host=\"${TARGET_HOST}\"\n```\n\n> 部署前 .env 中需解析 TEST_API_URL →\
  \ TARGET_HOST/PROTOCOL/PORT。可用 conftest 或独立脚本完成。\n\n## 性能质量门禁（双模式）\n\n| 指标 | full（50并发）\
  \ | ci_quick（5并发） | 不达标处置 |\n|------|--------------|------------------|---------|\n\
  | TPS | ≥100 | ≥20 | 性能 Bug → bug-manager |\n| P95 响应 | ≤500ms | ≤800ms | 性能 Bug，标注慢接口\
  \ |\n| 平均响应 | ≤200ms | ≤400ms | 告警 + 性能分析 |\n| 错误率 (pct) | <1% | <1% | 查日志 + 阻断发布\
  \ |\n| 基线回归 | <20% | 不强制 | 告警 + 排查 |\n\n## JTL 解析与门禁（实现位于 utils/jmeter_result_parser.py）\n\
  \n```bash\n# CI quick\npython -m utils.jmeter_result_parser \\\n    workspace/测试报告/{项目名}/jmeter-results/result.jtl\
  \ \\\n    --mode ci_quick\n\n# Full + 基线对比 + 通过则更新基线\npython -m utils.jmeter_result_parser\
  \ \\\n    workspace/测试报告/{项目名}/jmeter-results/result.jtl \\\n    --mode full \\\n\
  \    --baseline workspace/测试报告/{项目名}/baselines/perf_baseline.json \\\n    --update-baseline\n\
  ```\n\n## 向 report-generator 输出格式\n\n```json\n{\n  \"type\": \"performance\",\n\
  \  \"tool\": \"JMeter 5.6.3\",\n  \"executed_at\": \"2026-05-10T15:00:00\",\n  \"\
  mode\": \"ci_quick\",\n  \"jmx_file\": \"workspace/自动化脚本/jmeter/test_plan.jmx\"\
  ,\n  \"metrics\": {\n    \"total_requests\": 15000,\n    \"tps\": 102.5,\n    \"\
  avg_response_ms\": 145,\n    \"p95_response_ms\": 420,\n    \"p99_response_ms\"\
  : 680,\n    \"error_rate_pct\": 0.12\n  },\n  \"quality_gate\": {\n    \"overall\"\
  : \"PASS\",\n    \"checks\": {\n      \"tps\":   {\"actual\": 102.5, \"required\"\
  : \"≥100\", \"pass\": true},\n      \"p95\":   {\"actual\": 420,   \"required\"\
  : \"≤500ms\", \"pass\": true},\n      \"avg\":   {\"actual\": 145,   \"required\"\
  : \"≤200ms\", \"pass\": true},\n      \"error\": {\"actual_pct\": 0.12, \"required\"\
  : \"<1%\", \"pass\": true}\n    }\n  },\n  \"baseline\": {\n    \"baseline_exists\"\
  : true,\n    \"regression_pct\": 3.2,\n    \"is_regression\": false\n  },\n  \"\
  html_report\": \"workspace/测试报告/{项目名}/jmeter-report/index.html\",\n  \"jtl_file\"\
  : \"workspace/测试报告/{项目名}/jmeter-results/result.jtl\"\n}\n```\n\n## 输出文件结构\n\n```text\n\
  workspace/自动化脚本/jmeter/\n├── test_plan.jmx              # 标准接口压测计划\n├── business_flow.jmx\
  \          # 业务流程并发计划（按需）\n└── stepped_load.jmx           # 阶梯加压计划\n\nworkspace/测试数据/\n\
  └── jmeter_users.csv           # 参数化数据（data-preparer 生成）\n\nworkspace/测试报告/{项目名}/\n\
  ├── jmeter-results/result.jtl  # 原始结果（CSV）\n├── jmeter-report/index.html   # JMeter\
  \ HTML 可视化\n└── baselines/perf_baseline.json\n```\n\n## 代码质量要求\n\n```text\n✅ JMX\
  \ 中 host/protocol/port 全变量化（${TARGET_HOST/PROTOCOL/PORT}）\n✅ TARGET_HOST 不含协议前缀\n\
  ✅ CSV 由 data-preparer 生成，不在 JMX 中手写数据\n✅ 每个请求必须有响应断言（防静默失败）\n✅ JSONPostProcessor\
  \ 提取 Token（不用旧名 JSONPathExtractor）\n✅ 登录失败时 If Controller 中止后续请求\n✅ 结果保存到 workspace/测试报告/{项目名}/jmeter-results/\n\
  ✅ 解析与门禁统一调 utils/jmeter_result_parser.py\n✅ 性能 Bug 提交给 bug-manager（标题：[性能]-[接口名]-[指标超标]）\n\
  ```"
