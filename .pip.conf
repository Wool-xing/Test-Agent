# Test-Agent pip configuration — dependency confusion protection
# Priority: private/internal registry first, public PyPI fallback

[global]
# Default: PyPI (public registry)
index-url = https://pypi.org/simple

# For internal packages, set TAGENT_INTERNAL_REGISTRY env var
# CI_REGISTRY takes precedence in CI environments
# Example: export PIP_INDEX_URL=https://internal.registry/simple
