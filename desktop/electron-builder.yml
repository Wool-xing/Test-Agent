appId: com.testagent.desktop
productName: Test-Agent
copyright: Copyright 2026 Test-Agent Team

directories:
  output: ../dist-electron
  buildResources: build

files:
  - out/**/*
  - ../runtime/web/dist/**/*

extraResources:
  - from: ../dist-python/
    to: backend/
    filter:
      - "tagent-backend*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.icns
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Test-Agent
