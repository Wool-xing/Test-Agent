name: test-agent-runtime

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tagent-postgres
    environment:
      POSTGRES_USER: tagent
      POSTGRES_PASSWORD: tagent
      POSTGRES_DB: tagent
    ports:
      - "5432:5432"
    volumes:
      - tagent-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tagent"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: tagent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tagent
      MINIO_ROOT_PASSWORD: tagent-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - tagent-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 tagent tagent-secret &&
      mc mb --ignore-existing local/tagent-evidence &&
      exit 0
      "

  prefect-server:
    image: prefecthq/prefect:2.20-python3.11
    container_name: tagent-prefect
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_URL: http://0.0.0.0:4200/api
      PREFECT_UI_API_URL: http://localhost:4200/api
    ports:
      - "4200:4200"

  # Observability profile: docker compose --profile observability up
  tempo:
    profiles: ["observability"]
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.2.0
    ports:
      - "3100:3100"

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3000:3000"

volumes:
  tagent-pg:
  tagent-minio:
