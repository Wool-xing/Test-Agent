# Test-Agent 1.12.0 · 由 `tagent init` 生成于 2026-05-12 04:22:30
# 这是项目级配置(超出 .env 范围的运行时行为);可被 ~/.tagent/config.yml 用户级配置覆盖。

project:
  test_type: security
  platform: linux

router:
  llm_provider: claude
  llm_provider_fallback: ollama

skills:
  recommended:
    - smoke-test
    - regression-test
    - testcase-design
    - zentao-bug-submission

bug_tracker:
  primary: github
  # 多 tracker 并存(主宪章 §37):写成 [zentao, github],按 Bug label 路由
  # extra: [github]

notifiers:
  enabled: [slack]

quality_gates:
  smoke_pass_rate_min: 0.95
  regression_pass_rate_min: 0.90
  coverage_min: 0.80
  perf_p99_ms_max: 300

selftest:
  # 主宪章 §33 自检铁律
  pre_tag_required: true
  pass_threshold: 0.80
  strict_on_release: true

marketplace:
  enabled: false        # 默认关 · 主宪章 §30 safe-by-default
