repos:
  # ===== 基础 =====
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        # upstream skill 目录不动(主宪章 §14 §27 darwin-skill / karpathy-guidelines 禁本地 fork)
        exclude: ^skills/(darwin-skill|karpathy-guidelines)/
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # ===== Python 静态检查 =====
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.13
    hooks:
      - id: ruff
        args: [--config, "utils/.ruff.toml"]
        files: ^utils/
      - id: ruff
        args: [--config, "runtime/pyproject.toml"]
        files: ^runtime/
      # ruff-format 关掉：utils 紧凑 CLI 风格不需自动重排

  # ===== 凭据扫描（gitleaks）=====
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        # 扫描所有暂存内容，发现 API key/密码/token 即阻断 commit
        # 自定义规则可在项目根放 .gitleaks.toml 覆盖默认规则

  # ===== 安全：禁止提交敏感本地文档 =====
  - repo: local
    hooks:
      - id: forbid-private-source
        name: 禁止提交敏感本地文档（已在 .gitignore）
        entry: bash -c 'if git diff --cached --name-only | grep -q "Test-Agent工作流搭建.md"; then echo "❌ 禁止提交敏感本地文档（已在 .gitignore）"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      - id: forbid-env
        name: 禁止提交 .env（含敏感信息）
        entry: bash -c 'if git diff --cached --name-only | grep -E "(^|/)\.env$"; then echo "❌ 禁止提交 .env"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      # 防上游引用误入(主宪章 §29 + V1.10 铁律):上游参考是私有跨项目知识,绝不入 Test-Agent repo
      - id: forbid-essence-library
        name: 禁止提交 upstream 参考路径（私有跨项目知识）
        entry: bash -c 'M=$(git diff --cached --name-only | grep -E "(^|/)_?精髓库(/|$)" || true); if [ -n "$M" ]; then echo "❌ 禁止提交私有上游参考内容(主宪章 §29 + V1.10 铁律)"; echo "命中文件:"; echo "$M"; echo "处置:git rm --cached <file> && 移出 repo"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      # 文件统计校验（防误删 agent/skill/utils）
      - id: file-count-check
        name: Agents/Skills/Utils 数量校验
        entry: bash -c 'A=$(ls agents/[0-9]*.md 2>/dev/null | wc -l); S=$(ls skills/*.md 2>/dev/null | grep -v README | wc -l); U=$(find utils -name "*.py" ! -name "__init__.py" 2>/dev/null | wc -l); [ "$A" = "16" ] || { echo "❌ Agents count mismatch (expected 16, got $A)"; exit 1; }; [ "$S" -eq "32" ] || { echo "❌ Skills count mismatch (expected 32, got $S)"; exit 1; }; [ "$U" -eq "79" ] || { echo "❌ Utils count mismatch (expected 79, got $U)"; exit 1; }; echo "✅ File counts correct"'
        language: system
        pass_filenames: false
        always_run: true

      # L1 自检:agent/skill frontmatter lint(主宪章 §33,V1.10)
      - id: agent-frontmatter-lint
        name: Agent/Skill frontmatter L1 自检
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && python -m runtime.healthcheck.agent_smoke || exit 1'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # 版本号一致性检查:所有声明版本的文件必须与 VERSION 一致
      - id: version-consistency
        name: 版本号一致性检查
        entry: python scripts/check_version_consistency.py
        language: python
        pass_filenames: false
        always_run: true

  # ===== Markdown 风格 =====
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        # MD013(line-length) / MD033(inline-html) / MD041(first-line-h1)：项目宽松规则
        # MD036(emphasis-as-heading)：中文项目常用 **xxx** 当小标题，避免污染 TOC
        # MD022/031/032(blanks-around)：旧文档累积问题，渐进修复
        # MD024(no-duplicate-heading)：同名子段允许
        # MD034(no-bare-urls)：内部文档可直接贴 URL
        # MD040(fenced-code-language) / MD014(dollar-prefix) / MD009(trailing) / MD012(multi-blank) / MD010(hard-tab)
        # / MD025(single-h1) / MD026(trailing-punct):中文项目常见 nit,与现有 disable 风格一致
        args: ['--disable', 'MD013', 'MD033', 'MD041', 'MD036', 'MD022', 'MD031', 'MD032', 'MD024', 'MD034', 'MD040', 'MD014', 'MD025', 'MD026', 'MD050', 'MD049', 'MD007', 'MD035', 'MD038', 'MD039', '--']
        # upstream skill dirs 不改本地:darwin-skill / karpathy-guidelines(主宪章 §14 §27)
        exclude: ^(skills/(darwin-skill|karpathy-guidelines)/.*)$

# 配置：项目根 .markdownlint.json 自定义规则
default_install_hook_types: [pre-commit]
default_stages: [pre-commit]
