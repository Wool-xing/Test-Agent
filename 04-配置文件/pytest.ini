[pytest]
# pytest 标准配置文件

# 测试用例路径（pytest 收集起点）
testpaths = workspace/自动化脚本/python

# 标记定义（priority + type + module）
# 注：strict-markers 启用，所有用到的 marker 必须在此注册
markers =
    p0: P0级核心用例（必测）
    p1: P1级重要用例（优先测）
    p2: P2级次要用例（次要测）
    p3: P3级体验优化（可延后）
    smoke: 冒烟测试用例
    regression: 回归测试用例
    performance: 性能测试用例
    security: 安全测试用例
    flaky: 已知Flaky用例（隔离，不计入门禁）
    api: API 测试用例（pytest -m api 或 -m "p0 and api"）
    ui: UI 测试用例
    # 项目模块 marker：用户按业务自定义（示例：login/payment/order/profile）
    # 在此处追加你项目的模块名，避免 strict-markers 拦截
    # 扩展平台 markers
    mobile: 移动端用例（Android/iOS/小程序）
    android: Android 平台
    ios: iOS 平台
    miniprogram: 小程序（子平台如 wx/alipay/抖音 项目按需自定义）
    stability: 稳定性测试（含 Android Monkey）
    monkey: Android Monkey 测试
    websocket: WebSocket 协议测试
    ws: WebSocket 简称
    protocol: 协议层测试（WS / TCP / UDP / 自定义）
    # 非功能 8 维度
    compat: 兼容性测试（浏览器/OS/分辨率/语言矩阵）
    weak_network: 弱网测试（3G/4G/wifi_weak/satellite/offline）
    soak: 长时稳定性（≥24h endurance / 内存泄漏）
    reliability: 可靠性（重连 / 断电恢复 / 服务降级）
    chaos: 混沌工程（CPU/内存/磁盘/网络/进程注入）
    ux: 用户体验量化（任务时长 / 点击数 / TTI / 错误恢复率）
    usability: 易用性走查（Nielsen 10 + 角色扮演，定性）
    exploratory: 探索性测试（SBTM session）
    unit: 单元测试（函数级 + Mock）
    uat: 验收测试（BDD Gherkin Given-When-Then）
    failover: 灾备 / 故障切换
    volume: 容量测试（海量数据）
    spike: 峰值测试（瞬时流量）
    web_vitals: 前端性能 Web Vitals（LCP/FID/CLS）
    pact: 契约测试（消费者/提供者）
    a11y: 无障碍 WCAG
    i18n: 国际化 / 本地化
    mutation: 变异测试
    blockchain: 区块链 / 智能合约
    adversarial: AI 对抗鲁棒性 / LLM 越狱
    fuzzing: 模糊测试
    integration: 集成测试（金字塔中层）
    e2e: 端到端测试（金字塔顶层）
    slo: SLO/SLI 性能契约
    desktop: 桌面应用用例
    windows: Windows EXE
    macos: macOS GUI
    linux: Linux GUI
    electron: Electron 应用
    visual: 视觉/游戏测试
    game: 游戏专项
    ocr: OCR 识别
    system: 系统集成（IoT/MQ/Tracing/Media）
    iot: IoT 嵌入式
    media: 音视频校验
    tracing: 链路追踪
    mq: 消息队列
    ai: AI/ML 模型测试
    model: 模型质量
    drift: 数据漂移
    fairness: 公平性
    llm: LLM 应用

# 超时设置
timeout = 120
timeout_method = thread

# 并行执行（pytest-xdist）+ Allure + JUnit XML（默认开启 junit 输出供 flaky 检测/CI 门禁使用）
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
    --alluredir=workspace/执行日志/allure-results
    --junitxml=workspace/执行日志/junit-results.xml

# JUnit XML 格式：xunit2（兼容现代解析器）
junit_family = xunit2

# 失败重试：默认关闭。CI 重试场景在命令行显式开启（`--reruns=2 --reruns-delay=5`）。
# 关闭原因：reruns 会隐藏 Flaky 用例，与 utils/flaky_detector 检测策略冲突。

# 覆盖率：默认关闭。在 CI 命令行显式开启并指向被测代码：
# `--cov=$APP_SRC_PATH --cov-report=html --cov-report=xml --cov-fail-under=80`
# 不在 ini 默认开启的原因：未安装 pytest-cov 时 ini 默认会让 pytest 启动失败。

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file = workspace/执行日志/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# 用例收集配置
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
