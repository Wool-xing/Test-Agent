version: 2

updates:
  # ===== Python pip 依赖 =====
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "pip"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # pytest 生态一起升
      pytest-ecosystem:
        patterns:
          - "pytest"
          - "pytest-*"
          - "allure-pytest"
      # 安全工具
      security-tools:
        patterns:
          - "bandit"
          - "safety"
      # UI 自动化
      ui-automation:
        patterns:
          - "playwright"
          - "Appium-Python-Client"
          - "selenium"
          - "pywinauto"
          - "uiautomation"
      # 性能
      performance:
        patterns:
          - "locust"
      # 数据 / 文档
      data-doc:
        patterns:
          - "openpyxl"
          - "python-docx"
          - "python-pptx"
          - "reportlab"
          - "pdfplumber"
          - "pypdf"
          - "PyYAML"
          - "beautifulsoup4"
      # 数据库
      database:
        patterns:
          - "psycopg2-binary"
          - "pymysql"
          - "SQLAlchemy"
      # 协议 / 链路
      protocols:
        patterns:
          - "requests"
          - "websocket-client"
          - "websockets"
          - "paho-mqtt"
          - "kafka-python"
          - "pika"
          - "paramiko"
          - "pyserial"
      # AI / 数据科学
      ai-ml:
        patterns:
          - "scikit-learn"
          - "scipy"
          - "faker"
          - "factory-boy"
    ignore:
      # 锁死的核心库不允许 dependabot 升 major（手动评估）
      - dependency-name: "pytest"
        update-types: ["version-update:semver-major"]
        # pytest 9.x < 9.0.3 blocked for CVE-2025-71176 (TMPDIR handling).
        # 9.0.3+ is patched and allowed. Plugin ecosystem (pytest-xdist/allure-pytest)
        # compatibility verified with 9.0.3.
        versions: ["< 9.0.3"]
      - dependency-name: "playwright"
        update-types: ["version-update:semver-major"]

  # ===== GitHub Actions =====
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"

  # ===== npm（runtime/web — React/Vite 前端）=====
  - package-ecosystem: "npm"
    directory: "/runtime/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
      - "ui"
    commit-message:
      prefix: "deps(npm)"

  # ===== npm（desktop — Electron 桌面应用）=====
  - package-ecosystem: "npm"
    directory: "/desktop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
      - "desktop"
    commit-message:
      prefix: "deps(npm)"
