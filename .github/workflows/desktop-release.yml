name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          pip install -e runtime
          pip install pyinstaller

      - name: Build Python backend
        run: pyinstaller --clean --noconfirm desktop/pyinstaller/tagent_backend.spec

      - name: Build Web UI
        working-directory: runtime/web
        run: |
          npm install
          npm run build

      - name: Build Electron
        working-directory: desktop
        run: |
          npm install
          npx tsc -p electron/tsconfig.json
          npx electron-builder --win --config electron-builder.yml

      - uses: actions/upload-artifact@v4
        with:
          name: Test-Agent-Windows
          path: dist-electron/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          pip install -e runtime
          pip install pyinstaller

      - name: Build Python backend
        run: pyinstaller --clean --noconfirm desktop/pyinstaller/tagent_backend.spec

      - name: Build Web UI
        working-directory: runtime/web
        run: |
          npm install
          npm run build

      - name: Build Electron
        working-directory: desktop
        run: |
          npm install
          npx tsc -p electron/tsconfig.json
          npx electron-builder --mac --config electron-builder.yml

      - uses: actions/upload-artifact@v4
        with:
          name: Test-Agent-macOS
          path: dist-electron/Test-Agent-*.dmg

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Test-Agent-Windows/*.exe
            Test-Agent-macOS/Test-Agent-*.dmg
          draft: true
          generate_release_notes: true
