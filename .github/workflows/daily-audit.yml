name: Daily Audit

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  logic:
    name: 逻辑验证 Python多版本
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ matrix.python-version }}' }
      - name: 安装依赖
        run: pip install pydantic pydantic-settings typer rich loguru pyyaml httpx defusedxml python-dotenv prompt-toolkit packaging
      - name: 全模块导入
        run: |
          python -c "
          import sys; ok = True
          for m in [
              'runtime.cli.main','runtime.registry.registry','runtime.config.settings',
              'runtime.router.router','runtime.orchestrator.flows',
              'runtime.api.main','runtime.mcp.test_orchestrator.server',
              'runtime.cli.skins','runtime.tutor.theory_kb',
              'runtime.scheduler.scheduler','runtime.cli.slash_commands',
              'runtime.cli.interactive',
              'utils.data.data_factory','utils.quality.quality_gate_engine',
          ]:
              try:
                  __import__(m); print(f'  OK {m.rsplit(\".\",1)[1]}')
              except Exception as e:
                  print(f'  FAIL {m}: {e}'); ok = False
          sys.exit(0 if ok else 1)
          "

  functional:
    name: 功能深度验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: 安装依赖
        run: pip install pydantic pydantic-settings typer rich loguru pyyaml httpx defusedxml python-dotenv prompt-toolkit packaging

      - name: registry settings router API MCP
        run: |
          python -c "
          from runtime.registry.registry import build_catalog; cat = build_catalog()
          print(f'OK: {len(cat.experts)}e + {len(cat.skills)}s')
          from runtime.config.settings import get_settings; s = get_settings()
          for f in ['experts_dir','skills_dir','config_dir','templates_dir','scripts_dir','workspace_dir']:
              print(f'  OK {f} = {getattr(s,f)}')
          from runtime.router.router import Router; assert Router() is not None
          from runtime.orchestrator.flows import FlowRegistry; assert FlowRegistry is not None
          print('OK: Router + FlowRegistry')
          from runtime.api.main import app; assert len(app.routes) >= 3
          print(f'OK: API {len(app.routes)} routes')
          from runtime.mcp.test_orchestrator.server import mcp
          tools = [t.name for t in mcp.tools]; assert len(tools) >= 3
          print(f'OK: MCP {len(tools)} tools')
          "

      - name: 皮肤 插件 教学层 定时任务
        run: |
          python -c "
          from runtime.cli.skins import SKINS; assert len(SKINS) >= 3; print(f'OK: {len(SKINS)} skins')
          from runtime.plugins import discover_plugins
          plugins = discover_plugins(); print(f'OK: plugins ({len(plugins)})')
          from runtime.tutor.theory_kb import load_kb_if_legal
          kb = load_kb_if_legal(); print(f'OK: theory KB')
          from runtime.scheduler.scheduler import Scheduler
          Scheduler(); print('OK: scheduler')
          "

      - name: 路由意图 + 社交9平台 + 多端
        run: |
          python -c "
          from runtime.router.intent import classify_intent
          for t in ['smoke-test','regression-test','api-test','performance-test']:
              r = classify_intent(f'Run {t}'); print(f'  {t:20s} -> {str(r)[:40]}')
          for p in ['dingtalk','discord','email','feishu','qqbot','slack','telegram','webhook','wechat']:
              __import__(f'runtime.gateway.platforms.{p}'); print(f'  OK {p}')
          import os,json
          for a in ['desktop','mobile']:
              assert os.path.isfile(f'apps/{a}/package.json')
              print(f'OK: apps/{a}')
          "

      - name: CLI命令 + /命令 全量
        run: |
          python -c "
          import subprocess,sys
          out = subprocess.run(['python','-m','runtime.cli.main','--help'],capture_output=True,text=True)
          cmds = set(w for w in out.stdout.split() if w.isalpha() and not w.startswith('-'))
          cmds -= {'Usage','Options','Commands','Help','the','Show','version','information'}
          print(f'CLI: {len(cmds)} commands')
          for c in ['catalog','doctor','init','export','market','selftest','bootstrap','demo','gateway','run']:
              r = subprocess.run(['python','-m','runtime.cli.main',c,'--help'],capture_output=True,text=True)
              print(f'  {\"OK\" if r.returncode==0 else \"FAIL\"} {c}')
          from runtime.cli.slash_commands import COMMAND_REGISTRY
          from runtime.cli.interactive import _BUILTIN_MAP
          print(f'/: {len(COMMAND_REGISTRY)} registered + {len(_BUILTIN_MAP)} builtins')
          for c in COMMAND_REGISTRY:
              assert c.description, f'/{c.name} missing description'
          print('OK: all /commands have descriptions')
          "

      - name: 裸文本命令纠错 thefuck风格
        run: |
          python -c "
          from runtime.cli.interactive import _closest_command,_edit_distance
          for inp,exp in [('help','help'),('hel','help'),('docto','doctor'),('catalg','catalog'),('statuz','status')]:
              r = _closest_command(inp)
              assert r == exp, f'{inp} -> {r}, expected {exp}'; print(f'  OK {inp} -> {r}')
          assert _closest_command('xyzwq999') is None; print('  OK garbage -> None')
          assert _edit_distance('help','help')==0 and _edit_distance('help','hel')==1
          print('OK: edit distance correct')
          "

      - name: 错误处理 + install.py结构
        run: |
          python -m runtime.cli.main __nonexistent__ 2>&1 && echo "FAIL: exit 0" && exit 1 || echo "OK: invalid cmd"
          python -c "
          import ast; tree = ast.parse(open('install.py',encoding='utf-8').read())
          funcs = {n.name for n in ast.walk(tree) if isinstance(n,ast.FunctionDef)}
          required = {'main','finish','copy_agents','copy_skills','copy_config','setup_venv','_create_wrappers'}
          assert not (required-funcs), f'missing: {required-funcs}'; print('OK: install.py complete')
          "

  architecture:
    name: 架构合规 反硬编码 防漂移
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: 旧路径重生
        run: |
          for d in agents skills config desktop mobile marketplace profiles; do
            [ -d "$d" ] && echo "FAIL: $d/ reborn" && exit 1
          done; echo "OK: no old paths"

      - name: 每层目录纯净
        run: |
          ai_py=$(find ai/ -name "*.py" ! -path "ai/skills/*/scripts/*" 2>/dev/null | wc -l)
          [ "$ai_py" -eq 0 ] || { echo "FAIL: ai/ has $ai_py .py"; exit 1; }
          for a in desktop mobile; do
            [ -f "apps/$a/package.json" ] || { echo "FAIL: apps/$a/ missing package.json"; exit 1; }
          done
          root_py=$(ls *.py 2>/dev/null | grep -v install.py | wc -l)
          [ "$root_py" -eq 0 ] || { echo "FAIL: root has extra .py"; exit 1; }
          echo "OK: all layers clean"

      - name: 构建产物残留
        run: |
          n=$(find . \( -name "__pycache__" -o -name ".pytest_cache" -o -name ".ruff_cache" \
               -o -name ".coverage" -o -name "*.tsbuildinfo" -o -name "*.bak" \) \
               -not -path "./.git/*" -not -path "./.venv/*" 2>/dev/null | wc -l)
          [ "$n" -eq 0 ] || { echo "FAIL: $n artifacts"; exit 1; }; echo "OK: zero artifacts"

      - name: 路径硬编码
        run: python scripts/check_arch_compliance.py

      - name: INDEX.md + 目录结构
        run: |
          for d in ai apps deploy workspace; do [ -f "$d/INDEX.md" ] || { echo "FAIL: $d/INDEX.md"; exit 1; }; done
          for d in ai apps deploy runtime utils docs scripts ci requirements examples; do
            [ -d "$d" ] && echo "  OK $d/" || echo "  WARN $d/ missing"
          done; echo "OK: structure verified"

  dual-mode:
    name: 双模式互不干扰
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: 安装依赖
        run: pip install pydantic pydantic-settings typer rich loguru pyyaml httpx defusedxml python-dotenv prompt-toolkit packaging

      - name: CLI不依赖ai/ (隔离测试)
        run: |
          cp -r . /tmp/test-cli && cd /tmp/test-cli && rm -rf ai/
          python -c "
          import os; os.chdir('/tmp/test-cli')
          from runtime.registry.registry import build_catalog
          cat = build_catalog()
          # 无 ai/ 时 registry 返回空目录是设计预期
          print(f'OK: CLI survives without ai/ (registry: {len(cat.experts)}e+{len(cat.skills)}s)')
          "
          rm -rf /tmp/test-cli

      - name: runtime/ 无 ai/ 引用
        run: |
          refs=$(grep -rn "from ai\.\|import ai\.\|ai/agents\|ai/skills" --include="*.py" runtime/ 2>/dev/null || true)
          [ -z "$refs" ] || { echo "FAIL: runtime/ references ai/"; exit 1; }
          echo "OK: zero ai/ imports in runtime/"

      - name: ai/ 无 Python 依赖
        run: |
          refs=$(grep -rn "from runtime\|import runtime\|from utils\|import utils" --include="*.md" ai/ 2>/dev/null | wc -l)
          echo "OK: ai/ has $refs doc-refs (documentation, not code dependency)"

  deploy-verify:
    name: 部署后验证 文件完整性
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: install.py 语法
        run: python -c "compile(open('install.py',encoding='utf-8').read(),'install.py','exec');print('OK')"

      - name: 模拟部署 动态文件数比对
        run: |
          python -c "
          import os,shutil,glob,tempfile
          src = os.getcwd(); tmp = tempfile.mkdtemp()
          # agents: 源码 vs 部署后 1:1
          src_n = len(glob.glob(f'{src}/ai/agents/[0-9]*.md'))
          os.makedirs(f'{tmp}/agents',exist_ok=True)
          for f in glob.glob(f'{src}/ai/agents/[0-9]*.md'):
              shutil.copy2(f,f'{tmp}/agents')
          dst_n = len(glob.glob(f'{tmp}/agents/[0-9]*.md'))
          assert src_n==dst_n, f'agents: src={src_n} dst={dst_n}'; print(f'OK: agents {src_n} match')
          # skills
          os.makedirs(f'{tmp}/skills',exist_ok=True)
          src_s = [f for f in glob.glob(f'{src}/ai/skills/*.md') if os.path.basename(f)!='README.md']
          for f in src_s: shutil.copy2(f,f'{tmp}/skills')
          dst_s = len(glob.glob(f'{tmp}/skills/*.md'))
          print(f'OK: skills {len(src_s)} copied')
          # deploy/config 关键文件存在
          for f in ['.env.example','conftest.py','pytest.ini','requirements.txt','quality_gates.yaml','check_version.py']:
              assert os.path.isfile(f'{src}/deploy/config/{f}'), f'missing {f}'; print(f'  OK {f}')
          with open(f'{src}/deploy/config/.env.example') as fh:
              assert 'TAGENT_' in fh.read()
          print('OK: .env.example has TAGENT_ vars')
          shutil.rmtree(tmp); print('ALL DEPLOY CHECKS PASSED')
          "

  security:
    name: 安全审计
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 凭证 + 敏感文件
        run: |
          for pat in 'api_key\s*=\s*"[A-Za-z0-9_\-]{20,}"' 'token\s*=\s*"ghp_[A-Za-z0-9]{36,}"' 'BEGIN\s+(RSA|EC)\s+PRIVATE\s+KEY'; do
            grep -rPn --include="*.py" --include="*.yml" --include="*.json" "$pat" . \
              --exclude-dir=.git --exclude-dir=.venv --exclude-dir=node_modules 2>/dev/null | head -3
          done
          sf=$(find . \( -name "*.pem" -o -name "*.key" -o -name "id_rsa" \) -not -path "./.git/*" 2>/dev/null | wc -l)
          [ "$sf" -eq 0 ] || { echo "FAIL: $sf sensitive files"; exit 1; }
          echo "OK: security audit done"

  performance:
    name: 性能基线
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: 安装依赖
        run: pip install pydantic pydantic-settings typer rich loguru pyyaml httpx defusedxml python-dotenv prompt-toolkit packaging
      - name: 导入 + catalog 耗时
        run: |
          python -c "
          import time; t0=time.time()
          from runtime.config.settings import get_settings; s=get_settings(); t1=time.time()
          from runtime.registry.registry import build_catalog; cat=build_catalog(); t2=time.time()
          print(f'import: {t1-t0:.2f}s'); print(f'catalog: {t2-t1:.2f}s')
          assert t1-t0<5; assert t2-t1<2; print('OK')
          "

  quality:
    name: 代码质量 文档 防膨胀
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 文件大小
        run: |
          large=$(find runtime/ utils/ -name "*.py" -exec wc -l {} + | awk '$1>800{print $1,$2}' | sort -rn)
          [ -n "$large" ] && echo "WARN: files >800 lines" && echo "$large" | head -10 || echo "OK"
      - name: 关键文档
        run: |
          for f in CLAUDE.md CONTRIBUTING.md ai/CLAUDE.md ai/INDEX.md apps/INDEX.md deploy/INDEX.md workspace/INDEX.md; do
            [ -f "$f" ] || { echo "FAIL: $f"; exit 1; }; echo "  OK $f"
          done; echo "OK"
      - name: 无 .gitkeep
        run: |
          n=$(find . -name ".gitkeep" -not -path "./.git/*" 2>/dev/null | wc -l)
          [ "$n" -eq 0 ] || { echo "FAIL: $n .gitkeep"; exit 1; }; echo "OK"
