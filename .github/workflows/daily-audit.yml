name: Daily Audit

on:
  schedule:
    - cron: "0 3 * * *"   # 每日 UTC 03:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════
  # 一、架构合规
  # ═══════════════════════════════════════════
  arch-compliance:
    name: 架构合规检测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: 路径硬编码 + 目录纯净 + 构建产物
        run: python scripts/check_arch_compliance.py

  # ═══════════════════════════════════════════
  # 二、逻辑验证 — Python 多版本导入
  # ═══════════════════════════════════════════
  logic-multi-py:
    name: Python 多版本导入
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ matrix.python-version }}' }
      - name: 全模块导入验证
        run: |
          python -c "
          import sys, subprocess
          ok = True
          for mod in ['runtime.cli.main', 'runtime.registry.registry',
                       'runtime.config.settings', 'runtime.orchestrator.flows',
                       'utils.data.data_factory', 'utils.quality.quality_gate_engine']:
              try:
                  __import__(mod)
                  print(f'  OK {mod}')
              except Exception as e:
                  print(f'  FAIL {mod}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          "

  # ═══════════════════════════════════════════
  # 三、功能落地 — CLI 全命令 + 易用性验证
  # ═══════════════════════════════════════════
  functional-smoke:
    name: 功能落地验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: 安装依赖
        run: pip install pydantic pydantic-settings typer rich loguru pyyaml openpyxl httpx defusedxml python-dotenv prompt-toolkit packaging

      # ── 核心引擎 ──
      - name: registry 构建 (16e+32s)
        run: |
          python -c "
          from runtime.registry.registry import build_catalog
          cat = build_catalog()
          assert len(cat.experts) == 16, f'Expected 16, got {len(cat.experts)}'
          assert len(cat.skills) == 32, f'Expected 32, got {len(cat.skills)}'
          print(f'OK: {len(cat.experts)}e + {len(cat.skills)}s')
          "
      - name: settings 路径正确
        run: |
          python -c "
          from runtime.config.settings import get_settings
          s = get_settings()
          assert s.experts_dir.name in ('agents', 'ai'), f'unexpected experts_dir'
          assert s.skills_dir.name in ('skills', 'ai'), f'unexpected skills_dir'
          print(f'OK: paths correct')
          "

      # ── CLI 命令实跑 ──
      - name: tagent --help
        run: |
          python -m runtime.cli.main --help 2>&1 | tee /tmp/help.txt
          grep -q "doctor" /tmp/help.txt && echo "  OK doctor"
          grep -q "catalog" /tmp/help.txt && echo "  OK catalog"
          grep -q "run" /tmp/help.txt && echo "  OK run"
      - name: tagent catalog
        run: |
          out=$(python -m runtime.cli.main catalog 2>&1)
          echo "$out" | head -20
          echo "$out" | grep -q "16\|32" && echo "OK: catalog has counts" || echo "WARN"
      - name: tagent doctor --help
        run: |
          python -m runtime.cli.main doctor --help 2>&1 | tee /tmp/doc.txt
          grep -q "Usage\|用法\|usage" /tmp/doc.txt && echo "OK: help available"
      - name: tagent catalog --help
        run: python -m runtime.cli.main catalog --help 2>&1 | grep -q "Usage\|用法" && echo "OK" || echo "WARN"
      - name: tagent init --help
        run: python -m runtime.cli.main init --help 2>&1 | grep -q "Usage\|用法\|preset" && echo "OK" || echo "WARN"
      - name: tagent export --help
        run: python -m runtime.cli.main export --help 2>&1 | grep -q "Usage\|用法\|format" && echo "OK" || echo "WARN"
      - name: tagent market --help
        run: python -m runtime.cli.main market --help 2>&1 | grep -q "Usage\|用法\|install" && echo "OK" || echo "WARN"
      - name: tagent selftest --help
        run: python -m runtime.cli.main selftest --help 2>&1 | grep -q "Usage\|用法\|level" && echo "OK" || echo "WARN"

      # ── 易用性检查 ──
      - name: 命令帮助可访问性
        run: |
          cmd_list=(catalog doctor init export market selftest bootstrap demo gateway run)
          fail=0
          for cmd in "${cmd_list[@]}"; do
            if python -m runtime.cli.main "$cmd" --help >/dev/null 2>&1; then
              echo "  OK $cmd"
            else
              echo "  FAIL $cmd — no help"
              fail=1
            fi
          done
          exit $fail
      - name: 错误输入处理
        run: |
          # 无效命令应有非零退出码
          python -m runtime.cli.main __nonexistent__ 2>&1 && echo "FAIL: should exit non-zero" && exit 1
          echo "OK: invalid command handled"
      - name: install.py 输出完整性
        run: |
          python -c "
          import ast
          tree = ast.parse(open('install.py', encoding='utf-8').read())
          # 检查 finish() 函数包含必要信息
          for node in ast.walk(tree):
              if isinstance(node, ast.FunctionDef) and node.name == 'finish':
                  # 验证函数体非空
                  assert len(node.body) > 0, 'finish() body empty'
                  print('OK: finish() exists')
          # 验证关键函数存在
          funcs = {n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)}
          required = {'main', 'finish', 'copy_agents', 'copy_skills', 'copy_config', 'setup_venv', '_create_wrappers'}
          missing = required - funcs
          assert not missing, f'Missing functions: {missing}'
          print(f'OK: all {len(required)} key functions present')
          "

  # ═══════════════════════════════════════════
  # 四、终端命令健康检查（纠错 + 描述完整性 + 分发表）
  # ═══════════════════════════════════════════
  command-health:
    name: 命令健康检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: 安装依赖
        run: pip install pydantic pydantic-settings typer rich loguru pyyaml httpx defusedxml prompt-toolkit
      - name: 命令纠错 + 描述 + 分发表
        run: python scripts/check_command_health.py

  # ═══════════════════════════════════════════
  # 五、安全审计
  # ═══════════════════════════════════════════
  security-audit:
    name: 安全审计
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 凭证 + 敏感文件扫描
        run: |
          echo "=== 凭证扫描 ==="
          patterns=(
            'api_key\s*=\s*"[A-Za-z0-9_\-]{20,}"'
            'password\s*=\s*"[^\$][^"]{8,}"'
            'token\s*=\s*"ghp_[A-Za-z0-9]{36,}"'
            'BEGIN\s+(RSA|EC)\s+PRIVATE\s+KEY'
          )
          fail=0
          for pat in "${patterns[@]}"; do
            matches=$(grep -rPn --include="*.py" --include="*.yml" --include="*.yaml" --include="*.json" "$pat" . \
              --exclude-dir=.git --exclude-dir=.venv --exclude-dir=node_modules 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "WARN: potential credential found:"
              echo "$matches" | head -5
            fi
          done
          echo "=== 敏感文件检测 ==="
          for f in $(find . -name "*.pem" -o -name "*.key" -o -name "id_rsa" 2>/dev/null); do
            [ "$f" = "./.git" ] && continue
            echo "WARN: $f"
            fail=1
          done
          echo "OK: security audit done"

  # ═══════════════════════════════════════════
  # 五、性能基线
  # ═══════════════════════════════════════════
  perf-baseline:
    name: 性能基线
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: 安装依赖
        run: pip install pydantic pydantic-settings typer rich loguru pyyaml openpyxl httpx defusedxml python-dotenv prompt-toolkit packaging
      - name: 导入耗时
        run: |
          python -c "
          import time, sys
          t0 = time.time()
          from runtime.config.settings import get_settings
          s = get_settings()
          t1 = time.time()
          from runtime.registry.registry import build_catalog
          cat = build_catalog()
          t2 = time.time()
          import_time = t1 - t0
          catalog_time = t2 - t1
          print(f'import time: {import_time:.2f}s (limit 5s)')
          print(f'catalog build: {catalog_time:.2f}s (limit 2s)')
          assert import_time < 5, f'Import too slow: {import_time:.1f}s'
          assert catalog_time < 2, f'Catalog build too slow: {catalog_time:.1f}s'
          print('OK: performance within baseline')
          "

  # ═══════════════════════════════════════════
  # 六、兼容部署 — install.py 验证
  # ═══════════════════════════════════════════
  deploy-smoke:
    name: install.py 部署验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: install.py 语法检查
        run: python -c "compile(open('install.py', encoding='utf-8').read(), 'install.py', 'exec'); print('OK')"
      - name: 模拟文件拷贝
        run: |
          python -c "
          import os, shutil, glob, tempfile
          src = os.getcwd()
          tmp = tempfile.mkdtemp()
          os.makedirs(f'{tmp}/agents', exist_ok=True)
          os.makedirs(f'{tmp}/.claude/agents', exist_ok=True)
          # 测试 ai/agents/ 可访问
          n = len(glob.glob(f'{src}/ai/agents/[0-9]*.md'))
          assert n == 16, f'agents: expected 16, got {n}'
          # 测试 ai/skills/ 可访问
          n = len(glob.glob(f'{src}/ai/skills/*.md'))
          assert n >= 32, f'skills: expected >=32, got {n}'
          # 测试 deploy/config/ 可访问
          assert os.path.isdir(f'{src}/deploy/config'), 'deploy/config/ missing'
          shutil.rmtree(tmp)
          print(f'OK: deploy paths valid')
          "

  # ═══════════════════════════════════════════
  # 七、文档可访问
  # ═══════════════════════════════════════════
  docs-health:
    name: 文档路径可访问
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 关键文件存在性
        run: |
          files=(
            "CLAUDE.md"
            "ai/INDEX.md"
            "apps/INDEX.md"
            "deploy/INDEX.md"
            "workspace/INDEX.md"
            "ai/CLAUDE.md"
            "CONTRIBUTING.md"
            "docs/charter/INDEX.md"
            "docs/getting-started/INDEX.md"
          )
          fail=0
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "  OK $f"
            else
              echo "  MISSING $f"
              fail=1
            fi
          done
          exit $fail

  # ═══════════════════════════════════════════
  # 八、双模式互不干扰
  # ═══════════════════════════════════════════
  dual-mode-check:
    name: 双模式互不干扰
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ai/ 无 Python 依赖
        run: |
          py_files=$(find ai/ -name "*.py" 2>/dev/null)
          if [ -n "$py_files" ]; then
            echo "FAIL: ai/ 下不应有 .py 文件:"
            echo "$py_files"
            exit 1
          fi
          echo "OK: ai/ 无 .py 文件"
      - name: runtime/ 不依赖 ai/ 导入
        run: |
          imports=$(grep -rn "from ai\.\|import ai\.\|from ai/" --include="*.py" runtime/ 2>/dev/null || true)
          if [ -n "$imports" ]; then
            echo "FAIL: runtime/ 不应 import ai/"
            echo "$imports"
            exit 1
          fi
          echo "OK: runtime/ 无 ai/ 导入"

  # ═══════════════════════════════════════════
  # 九、代码膨胀检测
  # ═══════════════════════════════════════════
  code-bloat:
    name: 代码膨胀检测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 函数 >50行 / 文件 >800行 告警
        run: |
          echo "=== 文件 >800行 ==="
          large_files=$(find runtime/ utils/ -name "*.py" \
            -exec wc -l {} + 2>/dev/null | awk '$1 > 800 {print $1, $2}' | sort -rn)
          if [ -n "$large_files" ]; then
            echo "$large_files" | head -10
            echo "WARN: above files exceed 800 lines"
          else
            echo "OK: all files under 800 lines"
          fi
          echo ""
          echo "=== 函数 >50行 (需人工审查，此处仅统计不阻断) ==="
          grep -rn "^def \|^    def " --include="*.py" runtime/ utils/ \
            -A 100 2>/dev/null | awk '/^def/ {fn=$0; next} /^$|^[^ ]|^[a-zA-Z]/{next} END{}' || true
          echo "INFO: manual review recommended for large functions"

  # ═══════════════════════════════════════════
  # 十、workflow YAML 语法自检
  # ═══════════════════════════════════════════
  workflow-sanity:
    name: workflow YAML 语法
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: 验证所有 workflow YAML
        run: |
          pip install pyyaml
          python -c "
          import yaml, sys, glob
          ok = True
          for f in glob.glob('.github/workflows/*.yml'):
              try:
                  yaml.safe_load(open(f))
                  print(f'  OK {f}')
              except Exception as e:
                  print(f'  FAIL {f}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          "

  # ═══════════════════════════════════════════
  # 十一、变更范围感知 — 自动判断
  # ═══════════════════════════════════════════
  smart-scope:
    name: 变更范围感知
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: 分析变更范围
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null | wc -l)
          echo "Changed files: $changed"
          if [ "$changed" -le 3 ]; then
            echo "SCOPE: light — only essential checks recommended"
          else
            echo "SCOPE: full — run all checks"
          fi
