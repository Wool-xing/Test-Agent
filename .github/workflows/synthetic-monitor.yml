# Multi‑region synthetic monitoring — runs tagent demo on schedule across regions
name: Synthetic Monitor

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "7 */6 * * *"  # every 6 hours, off‑peak minute
  workflow_dispatch:

jobs:
  monitor:
    name: "smoke ${{ matrix.region }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region: [us-east, us-west, eu-west, ap-southeast]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          pip install --upgrade pip
          pip install pydantic pydantic-settings typer rich loguru pyyaml openpyxl factory-boy faker prefect defusedxml prompt-toolkit httpx mcp croniter
          python -c "import openpyxl; import factory; import faker; print('deps OK')"

      - name: Run demo (smoke)
        run: python -m runtime.cli.main demo -y
        env:
          TAGENT_LLM_PROVIDER: stub

      - name: Run selftest
        run: python -m runtime.cli.main selftest --e2e
        env:
          TAGENT_LLM_PROVIDER: stub

      - name: Report status
        if: failure()
        run: |
          echo "::warning::Synthetic monitor FAILED in ${{ matrix.region }}"
