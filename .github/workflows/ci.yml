name: 模板仓库自检

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "30 2 * * 1"   # 每周一 02:30 UTC（北京时间 10:30）

# 全局最小权限（CodeQL 要求显式声明，避免默认 read-write 全权限）
permissions:
  contents: read

jobs:
  # ===== 1. utils/ 代码质量 =====
  lint-utils:
    name: utils/ Ruff + 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Ruff 检查（用 utils/.ruff.toml 配置）
        run: |
          pip install ruff
          ruff check 05-代码示例/ --config 05-代码示例/.ruff.toml

      - name: 语法检查（py_compile）
        run: |
          python -m compileall 05-代码示例/ -q

  # ===== 2. 依赖漏洞扫描 =====
  security-audit:
    name: 依赖 CVE 扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 升级 pip
        run: python -m pip install --upgrade pip

      - name: pip-audit 扫描
        run: |
          pip install pip-audit
          pip-audit -r 04-配置文件/requirements.txt --format columns || true
        continue-on-error: true   # CI 模板仓库 audit 仅做参考，不强阻（避免依赖冲突误杀）

      - name: safety 扫描
        run: |
          pip install safety
          safety check -r 04-配置文件/requirements.txt --short-report
        continue-on-error: true

  # ===== 3. install.sh 脚本检查 =====
  shell-check:
    name: install.sh 语法
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          additional_files: 'install.sh'

  # ===== 3b. install.sh macOS 真机端到端 (本 session V1.14.0-alpha+1 新加) =====
  # 用 GitHub Actions macos-latest runner 实跑 install.sh, 验 ROADMAP "Mac 真机"挂账。
  # 关键: 设 TEST_AGENT_LOCAL_SRC 跳过 git clone, 用 PR 当前改动而非 fetch default branch。
  macos-real-install:
    name: install.sh macOS 端到端 (实跑)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 跑 install.sh /tmp/test-target (LOCAL_SRC=PR)
        env:
          TEST_AGENT_LOCAL_SRC: ${{ github.workspace }}
          # macOS runner 自带 git/bash/curl, npm 用于 claude-code (会装但允许失败,
          # CI 不验 npm 安装链, 仅验 install.sh 主流程 + Python venv)
          CI: "true"
        run: |
          mkdir -p /tmp/test-target
          set -o pipefail
          bash install.sh /tmp/test-target 2>&1 | tee /tmp/install.log
          echo "INSTALL_EXIT=${PIPESTATUS[0]}"
          test "${PIPESTATUS[0]}" -eq 0

      - name: 验关键 artifacts
        run: |
          # install.sh 实拷范围 (非引擎源 — runtime/ 通过 pip 装而非 cp):
          # 主要目录: 02-/03-/utils (含 05-代码示例 内文件 rename 到 utils)/.venv
          for d in "02-专家定义" "03-技能定义" utils .venv; do
            test -d "/tmp/test-target/$d" || { echo "❌ 缺目录: $d"; exit 1; }
          done
          # 顶层法律 / 治理 / 路线图文档 + CI/CD + .env (从 .env.example rename)
          for f in ROADMAP.md README.md LICENSE Jenkinsfile .env; do
            test -f "/tmp/test-target/$f" || { echo "❌ 缺文件: $f"; exit 1; }
          done
          # 验 05-代码示例 内 script 拷到 utils/
          test -f "/tmp/test-target/utils/generate_report.py" \
            || { echo "❌ 缺 utils/generate_report.py (05-代码示例 拷贝丢)"; exit 1; }
          echo "✅ install.sh macOS 实跑 OK"

      - name: 上传 install.log (失败时排错用)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-install-log
          path: /tmp/install.log

  # ===== 4. YAML / JSON 语法 =====
  config-syntax:
    name: 配置文件语法
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 验证 YAML
        run: |
          pip install pyyaml
          python -c "
          import yaml, sys
          for f in ['.github/dependabot.yml', '.github/workflows/ci.yml', '06-CICD集成/github-actions-test.yml']:
              try:
                  yaml.safe_load(open(f))
                  print(f'✅ {f}')
              except Exception as e:
                  print(f'❌ {f}: {e}')
                  sys.exit(1)
          "

      - name: 验证 JSON
        run: |
          python -c "
          import json, sys
          for f in ['04-配置文件/.mcp.json']:
              try:
                  json.load(open(f))
                  print(f'✅ {f}')
              except Exception as e:
                  print(f'❌ {f}: {e}')
                  sys.exit(1)
          "

  # ===== 5. utils 模块导入自检 =====
  import-check:
    name: utils 模块可导入
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: 安装基础依赖
        run: |
          set -o pipefail
          python -m pip install --upgrade pip
          pip install -r 04-配置文件/requirements.txt 2>&1 | tail -20 || \
            pip install pytest faker factory-boy requests websocket-client pdfplumber python-docx openpyxl PyYAML python-dotenv tenacity loguru beautifulsoup4 jsonschema

      - name: 核心 utils 导入测试
        run: |
          cd 05-代码示例
          python -c "
          import sys
          modules = [
              'api_retry_util', 'data_factory', 'data_masking',
              'excel_generator', 'flaky_detector', 'jmeter_csv_exporter',
              'jmeter_result_parser', 'regression_scope',
              'ci_quality_gate', 'prd_loader',
          ]
          failed = []
          for m in modules:
              try:
                  __import__(m)
                  print(f'✅ {m}')
              except Exception as e:
                  failed.append((m, str(e)))
                  print(f'❌ {m}: {e}')
          sys.exit(1 if failed else 0)
          "

  # ===== 6. Markdown 链接检查 =====
  markdown-links:
    name: Markdown 内部链接有效性
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 检查内部链接
        run: |
          set -e
          fail=0
          for md in $(find . -name "*.md" -not -path "./node_modules/*" -not -path "./.git/*"); do
            # 提取 markdown 内部链接 [...](xxx.md) 形式
            grep -oE "\[[^]]*\]\(([^)]+)\)" "$md" | grep -oE "\(([^)]+)\)" | tr -d "()" | while read link; do
              # 跳过 URL/锚点
              [[ "$link" =~ ^https?:// ]] && continue
              [[ "$link" =~ ^# ]] && continue
              [[ "$link" =~ ^mailto: ]] && continue
              # 解析相对路径
              dir=$(dirname "$md")
              target="$dir/$link"
              # 去 #anchor 部分
              target_file="${target%%#*}"
              if [ ! -f "$target_file" ] && [ ! -d "$target_file" ]; then
                echo "❌ $md → $link (target=$target_file 不存在)"
                fail=1
              fi
            done || true
          done
          [ $fail -eq 0 ] && echo "✅ 所有内部链接有效"

  # ===== 7. 文件统计校验 =====
  file-count:
    name: Agents/Skills/Utils 数量 + 私有 MD 防护
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 统计核对
        run: |
          AGENTS=$(ls 02-专家定义/[0-9]*.md | wc -l)
          SKILLS=$(ls 03-技能定义/*.md | grep -v README | wc -l)
          UTILS=$(ls 05-代码示例/*.py | wc -l)
          echo "Agents=$AGENTS Skills=$SKILLS Utils=$UTILS"
          [ "$AGENTS" = "16" ] || { echo "❌ Agents 数量不符（期 16，实 $AGENTS）"; exit 1; }
          [ "$SKILLS" -ge "25" ] || { echo "❌ Skills 数量不符（期 ≥25，实 $SKILLS）"; exit 1; }
          [ "$UTILS" = "49" ] || { echo "❌ Utils 数量不符（期 49，实 $UTILS）"; exit 1; }
          echo "✅ 文件统计正确"

      - name: 验证 .gitignore 排除源 MD
        run: |
          if [ -f "Test-Agent工作流搭建.md" ]; then
            echo "❌ 私有源 MD 未应该出现在仓库"
            exit 1
          fi
          grep "Test-Agent工作流搭建.md" .gitignore || \
            { echo "❌ .gitignore 未排除源 MD"; exit 1; }
          echo "✅ 私有源 MD 受保护"

      - name: 验证 .gitignore 排除精髓库（V1.10 §34）
        run: |
          if [ -d "_精髓库" ] || [ -d "**/_精髓库" ]; then
            echo "❌ 私有精髓库不应该出现在仓库（主宪章 §29 §34）"
            exit 1
          fi
          grep "_精髓库" .gitignore || \
            { echo "❌ .gitignore 未排除精髓库"; exit 1; }
          echo "✅ 私有精髓库受保护"

  # ===== 8. L2 self-test(mock LLM,主宪章 §33,V1.10)=====
  selftest-mock:
    name: L2 self-test · mock LLM e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: 安装运行时依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r 04-配置文件/requirements.txt 2>&1 | tail -10 || true
          # 兜底:确保关键运行时模块在
          pip install pydantic pydantic-settings typer rich loguru pyyaml openpyxl factory-boy faker prefect

      - name: L1 frontmatter lint(主宪章 §33 第 1 层)
        run: |
          python -m runtime.healthcheck.agent_smoke

      - name: L2 e2e mock router(stub LLM,无外部调用)
        env:
          TAGENT_LLM_PROVIDER: stub
          TAGENT_LLM_PROVIDER_FALLBACK: stub
        run: |
          python -m runtime.cli.main selftest --e2e --pass-threshold 0.80
          echo "✅ L2 stub e2e ≥80% 节点通过"
