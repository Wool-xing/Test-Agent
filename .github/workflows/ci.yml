name: 模板仓库自检

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop, 'release/**']
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1"   # 每周一 02:30 UTC（北京时间 10:30）

# 全局最小权限（CodeQL 要求显式声明，避免默认 read-write 全权限）
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===== 0. 版本号一致性（最快，无外部依赖）=====
  version-check:
    name: 版本号一致性检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: python scripts/check_version_consistency.py

  # ===== 0b. 命令注册表一致性 (防dispatch/help不同步) =====
  command-consistency:
    name: 命令注册表一致性
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check command registration
        run: python scripts/check_command_consistency.py

  # ===== 0c. 硬编码检测 (防写死版本/端口/计数/密钥) =====
  hardcoded-check:
    name: 硬编码检测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded values
        run: python scripts/check_hardcoded_values.py

  # ===== 0d. 架构合规检测 (路径硬编码/目录纯净/构建产物) =====
  arch-compliance:
    name: 架构合规检测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 架构合规 + 路径硬编码 + 构建产物
        run: python scripts/check_arch_compliance.py

  # ===== 1. utils/ 代码质量 =====
  lint-utils:
    name: utils/ Ruff + 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Ruff 检查（用 utils/.ruff.toml 配置）
        run: |
          pip install ruff
          ruff check utils/ --config utils/.ruff.toml

      - name: 语法检查（py_compile）
        run: |
          python -m compileall utils/ -q
          python -m compileall runtime/ -q

  # ===== 1b. L7 契约门禁 (Shift-Left: OpenAPI 变更 → 契约验证) =====
  contract-gate:
    name: L7 契约门禁
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install jsonschema requests

      - name: L7 契约检测
        run: |
          python utils/quality/ci_contract_gate.py \
            --base-ref "origin/${{ github.base_ref }}" \
            --consumer "test-agent-ci" \
            --output-json workspace/contracts/ci-contract-result.json || {
              echo "::warning::Contract gate failed — check workspace/contracts/ for details"
            }

      - name: 上传契约产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts
          path: workspace/contracts/
          retention-days: 7

  # ===== 2. 依赖漏洞扫描 =====
  security-audit:
    name: 依赖 CVE 扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 升级 pip
        run: python -m pip install --upgrade pip

      - name: pip-audit 扫描
        run: |
          pip install pip-audit
          pip-audit -r deploy/config/requirements.txt --format columns || true
        # 使用 || true 确保扫描完整运行，但 job 会因非零退出码显示为失败
        # 可通过 branch protection 设置决定是否阻断合并

      - name: safety 扫描
        run: |
          pip install safety
          safety check -r deploy/config/requirements.txt --short-report || true

  # ===== 3. install.py 脚本检查 =====
  install-syntax:
    name: install.py 语法
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 语法检查 (install.py)
        run: python -m py_compile install.py

  # ===== 3b. install.py macOS 真机端到端 =====
  macos-real-install:
    name: install.py macOS 端到端 (实跑)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 跑 install.py /tmp/test-target (LOCAL_SRC=PR)
        env:
          TEST_AGENT_LOCAL_SRC: ${{ github.workspace }}
          CI: "true"
        run: |
          mkdir -p /tmp/test-target
          python install.py /tmp/test-target 2>&1 | tee /tmp/install.log

      - name: 验关键 artifacts
        run: |
          # install.py 实际部署结构 (非源仓 mirror, 而是 Claude Code 项目脚手架):
          #   agents/[0-9]*.md → .claude/agents/
          #   skills/*.md → .claude/skills/
          #   utils/*.py → utils/
          #   config/{conftest.py,pytest.ini,.mcp.json,requirements.txt} → PROJECT_ROOT/
          #   config/.env.example → PROJECT_ROOT/.env (rename)
          #   ci/* → .github/workflows/test.yml + Jenkinsfile
          #   顶层 LICENSE/ROADMAP/README/... → PROJECT_ROOT/
          #   .venv/ 新建 + pip 装依赖
          # runtime/ 不拷 (引擎源, V2 通过 pip 装独立分发)
          for d in .claude/agents .claude/skills utils .venv; do
            test -d "/tmp/test-target/$d" || { echo "❌ 缺目录: $d"; exit 1; }
          done
          for f in ROADMAP.md README.md LICENSE Jenkinsfile .env \
                   conftest.py pytest.ini .mcp.json requirements.txt \
                   .github/workflows/test.yml; do
            test -f "/tmp/test-target/$f" || { echo "❌ 缺文件: $f"; exit 1; }
          done
          # 报实际拷贝计数 (不写死 expected — install.py log 自报, CI 不重复 assert)
          agent_n=$(find /tmp/test-target/.claude/agents -maxdepth 1 -name '[0-9]*.md' | wc -l | tr -d ' ')
          skill_md_n=$(find /tmp/test-target/.claude/skills -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          skill_dir_n=$(find /tmp/test-target/.claude/skills -maxdepth 1 -mindepth 1 -type d | wc -l | tr -d ' ')
          echo "deployed: agent=$agent_n, skill.md=$skill_md_n, skill.dir=$skill_dir_n"
          # 严格 == 校验 (与 catalog frontmatter 单源真相对齐: 16 agent / 32 skill.md / 3 meta subdir)
          test "$agent_n" -eq 16 || { echo "❌ agent 数 $agent_n ≠ 16"; exit 1; }
          test "$skill_md_n" -eq 32 || { echo "❌ skill .md 数 $skill_md_n ≠ 32"; exit 1; }
          test "$skill_dir_n" -eq 3 || { echo "❌ skill meta 子目录数 $skill_dir_n ≠ 3 (期望 darwin/karpathy/nuwa)"; exit 1; }
          # 验 utils/ 内 script 存在
          test -f "/tmp/test-target/utils/reporting/generate_report.py" \
            || { echo "❌ 缺 utils/reporting/generate_report.py (拷贝丢)"; exit 1; }
          echo "✅ install.py macOS 实跑 OK"

      - name: 上传 install.log (失败时排错用)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-install-log
          path: /tmp/install.log

  # ===== 4. YAML / JSON 语法 =====
  config-syntax:
    name: 配置文件语法
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 验证 YAML
        run: |
          pip install pyyaml
          python -c "
          import yaml, sys
          for f in ['.github/dependabot.yml', '.github/workflows/ci.yml', 'ci/github-actions-test.yml']:
              try:
                  yaml.safe_load(open(f))
                  print(f'✅ {f}')
              except Exception as e:
                  print(f'❌ {f}: {e}')
                  sys.exit(1)
          "

      - name: 验证 JSON
        run: |
          python -c "
          import json, sys
          for f in ['deploy/config/.mcp.json']:
              try:
                  json.load(open(f))
                  print(f'✅ {f}')
              except Exception as e:
                  print(f'❌ {f}: {e}')
                  sys.exit(1)
          "

  # ===== 5. utils 模块导入自检 =====
  import-check:
    name: utils 模块可导入
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 安装基础依赖
        run: |
          set -o pipefail
          python -m pip install --upgrade pip
          pip install -r deploy/config/requirements.txt 2>&1 | tail -20 || \
            pip install pytest faker factory-boy requests websocket-client pdfplumber python-docx openpyxl PyYAML python-dotenv tenacity loguru beautifulsoup4 jsonschema

      - name: 核心 utils 导入测试
        run: |
          python -c "
          import sys
          modules = [
              'utils.protocols.api_retry_util', 'utils.data.data_factory', 'utils.data.data_masking',
              'utils.reporting.excel_generator', 'utils.quality.flaky_detector', 'utils.performance.jmeter_csv_exporter',
              'utils.performance.jmeter_result_parser', 'utils.infra.regression_scope',
              'utils.quality.ci_quality_gate', 'utils.design.prd_loader',
          ]
          failed = []
          for m in modules:
              try:
                  __import__(m)
                  print(f'✅ {m}')
              except Exception as e:
                  failed.append((m, str(e)))
                  print(f'❌ {m}: {e}')
          sys.exit(1 if failed else 0)
          "

  # ===== 6. Markdown 链接检查 =====
  markdown-links:
    name: Markdown 内部链接有效性
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查内部链接
        run: |
          set -e
          fail=0
          for md in $(find . -name "*.md" -not -path "./node_modules/*" -not -path "./.git/*"); do
            # 提取 markdown 内部链接 [...](xxx.md) 形式
            # 使用 process substitution 避免 pipe subshell 吞掉 fail=1
            while read link; do
              # 跳过 URL/锚点
              [[ "$link" =~ ^https?:// ]] && continue
              [[ "$link" =~ ^# ]] && continue
              [[ "$link" =~ ^mailto: ]] && continue
              # 解析相对路径
              dir=$(dirname "$md")
              target="$dir/$link"
              # 去 #anchor 部分
              target_file="${target%%#*}"
              if [ ! -f "$target_file" ] && [ ! -d "$target_file" ]; then
                echo "❌ $md → $link (target=$target_file 不存在)"
                fail=1
              fi
            done < <(grep -oE "\[[^]]*\]\(([^)]+)\)" "$md" | grep -oE "\(([^)]+)\)" | tr -d "()")
          done
          if [ $fail -ne 0 ]; then
            echo "❌ 发现死链，请修复后重试"
            exit 1
          fi
          echo "✅ 所有内部链接有效"

  # ===== 7. 文件统计校验 =====
  file-count:
    name: Agents/Skills/Utils 数量 + 私有 MD 防护
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 统计核对
        run: |
          AGENTS=$(ls ai/agents/[0-9]*.md | wc -l)
          SKILLS=$(ls ai/skills/*.md | grep -v README | wc -l)
          UTILS=$(find utils -name "*.py" ! -name "__init__.py" | wc -l)
          echo "Agents=$AGENTS Skills=$SKILLS Utils=$UTILS"
          [ "$AGENTS" = "16" ] || { echo "❌ Agents count mismatch (expected 16, got $AGENTS)"; exit 1; }
          [ "$SKILLS" -eq "32" ] || { echo "❌ Skills count mismatch (expected 32, got $SKILLS)"; exit 1; }
          [ "$UTILS" -eq "79" ] || { echo "❌ Utils count mismatch (expected 79, got $UTILS)"; exit 1; }
          echo "✅ File counts correct"

      - name: 验证 .gitignore 排除源 MD
        run: |
          if [ -f "Test-Agent.md" ]; then
            echo "❌ 敏感本地文档不应出现在仓库"
            exit 1
          fi
          grep "Test-Agent.md" .gitignore || \
            { echo "❌ .gitignore 未排除源 MD"; exit 1; }
          echo "✅ 敏感本地文档受保护"

      - name: 验证 .gitignore 排除精髓库（V1.10 §34）
        run: |
          if [ -d "_精髓库" ] || [ -d "**/_精髓库" ]; then
            echo "❌ 私有知识库不应出现在仓库"
            exit 1
          fi
          grep "_精髓库" .gitignore || \
            { echo "❌ .gitignore 未排除私有知识库"; exit 1; }
          echo "✅ 私有知识库受保护"

  # ===== 8. L2 self-test (mock LLM) =====
  selftest-mock:
    name: L2 self-test · mock LLM e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 安装运行时依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r deploy/config/requirements.txt 2>&1 | tail -10 || true
          # 兜底:确保关键运行时模块在
          pip install pydantic pydantic-settings typer rich loguru pyyaml openpyxl factory-boy faker prefect defusedxml prompt-toolkit

      - name: L1 frontmatter lint
        run: |
          python -m runtime.healthcheck.agent_smoke

      - name: L2 e2e mock router(stub LLM,无外部调用)
        env:
          TAGENT_LLM_PROVIDER: stub
          TAGENT_LLM_PROVIDER_FALLBACK: stub
        run: |
          python -m runtime.cli.main selftest --e2e --pass-threshold 0.80
          echo "✅ L2 stub e2e ≥80% 节点通过"

  # ===== 9. runtime/tests pytest 单元测试 =====
  pytest-unit:
    name: runtime/tests pytest 单元
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 安装 runtime 最小依赖
        run: |
          python -m pip install --upgrade pip
          # runtime/ 依赖 (与 selftest-mock 一致)
          pip install pydantic pydantic-settings typer rich loguru pyyaml openpyxl factory-boy faker prefect fastapi python-multipart httpx numpy defusedxml tenacity python-dotenv requests prompt-toolkit
          pip install mcp croniter  # P3 #16 FTS5 + #12 MCP client + #13 scheduler
          # pytest core (排除 pytest-bdd / pytest-playwright 等用户场景 plugin)
          pip install pytest pytest-asyncio pytest-cov

      - name: pytest runtime/tests/ (排除 test_router_real 真 LLM)
        env:
          TAGENT_LLM_PROVIDER: stub
          TAGENT_LLM_PROVIDER_FALLBACK: stub
          PREFECT_SERVER_ALLOW_EPHEMERAL_MODE: 'false'
        run: |
          python -m pytest runtime/tests/ \
            --ignore=runtime/tests/test_router_real.py \
            --ignore=runtime/tests/test_smoke_e2e.py \
            --cov=runtime --cov=utils \
            --cov-report=term --cov-report=html \
            -p no:cacheprovider \
            -v --tb=short
          echo "✅ pytest 单元测试全过"
