name: Mobile Build
# Sprint 9-10: Android APK/AAB + iOS IPA CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths: ['apps/mobile/**', '.github/workflows/mobile-build.yml']
  pull_request:
    paths: ['apps/mobile/**']

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with: {distribution: 'temurin', java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {flutter-version: '3.22', channel: 'stable'}
      - run: cd apps/mobile && flutter pub get
      - run: cd apps/mobile && flutter build apk --release
      - run: cd apps/mobile && flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with: {name: android-build, path: apps/mobile/build/app/outputs/}

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {flutter-version: '3.22', channel: 'stable'}
      - run: cd apps/mobile && flutter pub get
      - run: cd apps/mobile && flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v4
        with: {name: ios-build, path: apps/mobile/build/ios/}
